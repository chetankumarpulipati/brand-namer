services:
  - type: web
    name: brand-namer-api
    runtime: node
    repo: https://github.com/chetankumarpulipati/brand-namer
    buildCommand: pnpm install && cd apps/api && npx prisma generate
    startCommand: cd apps/api && npx tsx src/index.ts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_API_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_API_MODEL
        value: meta/llama-3.1-8b-instruct
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /health
